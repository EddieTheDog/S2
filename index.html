<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1">
  <title>Netflix</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔴</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Netflix+Sans:wght@300;400;500;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --netflix-red: #E50914;
      --netflix-dark: #141414;
      --netflix-gray: #808080;
      --netflix-light-gray: #b3b3b3;
      --white: #ffffff;
      --profile-size: 160px;
    }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: var(--netflix-dark);
      color: var(--white);
      font-family: 'Netflix Sans', 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ===================== PROFILE SELECTION ===================== */
    #profiles-screen {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--netflix-dark);
      position: absolute;
      top: 0; left: 0;
      z-index: 100;
    }

    #profiles-screen .netflix-logo {
      position: absolute;
      top: 48px;
      left: 60px;
    }

    #profiles-screen .netflix-logo svg {
      width: 148px;
      height: 40px;
      fill: var(--netflix-red);
    }

    #profiles-screen h1 {
      font-size: 48px;
      font-weight: 400;
      margin-bottom: 64px;
      letter-spacing: 0;
      color: var(--white);
    }

    .profiles-grid {
      display: flex;
      gap: 48px;
      align-items: center;
      justify-content: center;
    }

    .profile-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      gap: 20px;
    }

    .profile-avatar-wrap {
      width: var(--profile-size);
      height: var(--profile-size);
      border-radius: 8px;
      overflow: hidden;
      border: 3px solid transparent;
      transition: border-color 0.15s, transform 0.15s;
      position: relative;
    }

    .profile-item.focused .profile-avatar-wrap {
      border-color: var(--white);
      transform: scale(1.1);
    }

    .profile-avatar-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-name {
      font-size: 22px;
      font-weight: 400;
      color: var(--netflix-gray);
      transition: color 0.15s;
      text-align: center;
    }

    .profile-item.focused .profile-name {
      color: var(--white);
    }

    /* Add Profile */
    .profile-add .profile-avatar-wrap {
      background: #333;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .profile-add .plus-icon {
      width: 60px;
      height: 60px;
      fill: #808080;
      transition: fill 0.15s;
    }

    .profile-add.focused .plus-icon { fill: var(--white); }

    .manage-profiles-btn {
      margin-top: 60px;
      padding: 14px 40px;
      border: 2px solid var(--netflix-gray);
      background: transparent;
      color: var(--netflix-gray);
      font-size: 22px;
      font-family: inherit;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 4px;
      transition: border-color 0.15s, color 0.15s;
    }

    .manage-profiles-btn.focused {
      border-color: var(--white);
      color: var(--white);
    }

    /* ===================== PIN SCREEN ===================== */
    #pin-screen {
      display: none;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0; left: 0;
      z-index: 200;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    #pin-screen.active { display: flex; }

    .pin-box {
      background: #1f1f1f;
      padding: 60px 80px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .pin-box h2 { font-size: 32px; font-weight: 400; }
    .pin-box p { color: var(--netflix-light-gray); font-size: 20px; }

    .pin-dots {
      display: flex;
      gap: 20px;
      margin: 8px 0;
    }

    .pin-dot {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #555;
      transition: background 0.2s;
    }

    .pin-dot.filled { background: var(--white); }

    .pin-numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 8px;
    }

    .pin-key {
      width: 100px; height: 70px;
      background: #333;
      border: none;
      color: var(--white);
      font-size: 26px;
      font-family: inherit;
      border-radius: 6px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid transparent;
      transition: border-color 0.1s, background 0.1s;
    }

    .pin-key.focused { border-color: var(--white); background: #444; }
    .pin-key.backspace { font-size: 20px; }

    /* ===================== BROWSE SCREEN ===================== */
    #browse-screen {
      display: none;
      width: 1920px;
      height: 1080px;
      position: absolute;
      top: 0; left: 0;
      overflow: hidden;
      background: var(--netflix-dark);
    }

    #browse-screen.active { display: block; }

    /* Navbar */
    .nav-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 90px;
      display: flex;
      align-items: center;
      padding: 0 60px;
      gap: 48px;
      z-index: 50;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
      transition: background 0.3s;
    }

    .nav-bar.solid { background: var(--netflix-dark); }

    .nav-logo {
      flex-shrink: 0;
    }

    .nav-logo svg {
      width: 120px;
      height: 32px;
      fill: var(--netflix-red);
    }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .nav-links li a {
      color: var(--netflix-light-gray);
      text-decoration: none;
      font-size: 18px;
      transition: color 0.15s;
    }

    .nav-links li a:hover,
    .nav-links li a.focused { color: var(--white); }
    .nav-links li a.active { color: var(--white); font-weight: 500; }

    .nav-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .nav-icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px; height: 40px;
      border-radius: 4px;
      transition: color 0.15s;
    }

    .nav-icon-btn.focused { color: var(--netflix-red); }
    .nav-icon-btn svg { width: 28px; height: 28px; fill: currentColor; }

    .nav-profile-img {
      width: 38px; height: 38px;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s;
    }

    .nav-profile-img.focused { border-color: var(--white); }
    .nav-profile-img img { width: 100%; height: 100%; object-fit: cover; }

    /* Hero Banner */
    .hero {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 700px;
      overflow: hidden;
    }

    .hero-bg {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    .hero-gradient {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 100%;
      background: linear-gradient(
        to bottom,
        rgba(20,20,20,0) 0%,
        rgba(20,20,20,0) 40%,
        rgba(20,20,20,0.7) 70%,
        rgba(20,20,20,1) 100%
      );
    }

    .hero-gradient-left {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 60%;
      background: linear-gradient(to right, rgba(20,20,20,0.7) 0%, transparent 100%);
    }

    .hero-info {
      position: absolute;
      bottom: 120px;
      left: 60px;
      max-width: 600px;
    }

    .hero-logo {
      max-width: 400px;
      margin-bottom: 24px;
    }

    .hero-title {
      font-size: 56px;
      font-weight: 700;
      line-height: 1.1;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
      margin-bottom: 20px;
    }

    .hero-desc {
      font-size: 20px;
      line-height: 1.5;
      color: var(--white);
      text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
      margin-bottom: 32px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .hero-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 18px;
      margin-bottom: 28px;
      color: var(--white);
    }

    .hero-match { color: #46d369; font-weight: 700; }
    .hero-age-rating {
      border: 1px solid rgba(255,255,255,0.7);
      padding: 2px 8px;
      font-size: 16px;
    }

    .hero-buttons {
      display: flex;
      gap: 16px;
    }

    .hero-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      border: none;
      border-radius: 4px;
      font-size: 22px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }

    .hero-btn svg { width: 26px; height: 26px; fill: currentColor; flex-shrink: 0; }

    .btn-play {
      background: var(--white);
      color: #000;
    }

    .btn-play.focused {
      border-color: #aaa;
      background: rgba(255,255,255,0.75);
    }

    .btn-more {
      background: rgba(109,109,110,0.7);
      color: var(--white);
    }

    .btn-more.focused {
      border-color: var(--white);
      background: rgba(109,109,110,0.4);
    }

    /* Content Rows */
    .rows-container {
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      top: 540px;
      overflow: hidden;
      padding: 0 0 40px 0;
    }

    .rows-inner {
      position: absolute;
      left: 0; right: 0;
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .row {
      margin-bottom: 48px;
    }

    .row-title {
      font-size: 22px;
      font-weight: 500;
      padding: 0 60px;
      margin-bottom: 14px;
      color: var(--white);
    }

    .row-items {
      display: flex;
      gap: 8px;
      padding: 8px 60px;
      overflow: visible;
      position: relative;
    }

    /* Card */
    .card {
      flex-shrink: 0;
      width: 240px;
      position: relative;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94), z-index 0s;
      z-index: 1;
    }

    .card.focused {
      transform: scale(1.25);
      z-index: 20;
      outline: 3px solid var(--white);
    }

    .card img {
      width: 100%;
      height: 135px;
      object-fit: cover;
      display: block;
      border-radius: 4px;
    }

    /* Card label */
    .card-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
      padding: 20px 8px 8px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .card.focused .card-label { opacity: 1; }

    /* ===================== DETAIL OVERLAY ===================== */
    #detail-overlay {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 300;
      background: rgba(0,0,0,0.7);
      align-items: center;
      justify-content: center;
    }

    #detail-overlay.active { display: flex; }

    .detail-modal {
      width: 860px;
      background: #181818;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0,0,0,0.8);
    }

    .detail-hero {
      width: 100%;
      height: 480px;
      position: relative;
      overflow: hidden;
    }

    .detail-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .detail-hero-gradient {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 60%;
      background: linear-gradient(to bottom, transparent, #181818);
    }

    .detail-hero-info {
      position: absolute;
      bottom: 32px;
      left: 40px;
      right: 40px;
    }

    .detail-title { font-size: 40px; font-weight: 700; margin-bottom: 20px; }

    .detail-buttons { display: flex; gap: 12px; margin-bottom: 20px; }

    .detail-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 24px;
      border-radius: 4px;
      border: 2px solid transparent;
      font-size: 18px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .detail-btn svg { width: 22px; height: 22px; fill: currentColor; }

    .detail-btn-play { background: var(--white); color: #000; }
    .detail-btn-play.focused { border-color: #888; background: rgba(255,255,255,0.8); }
    .detail-btn-icon { background: rgba(42,42,42,0.9); color: var(--white); width: 52px; height: 52px; padding: 0; justify-content: center; border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; }
    .detail-btn-icon.focused { border-color: var(--white); }
    .detail-btn-close {
      position: absolute;
      top: 20px; right: 20px;
      width: 44px; height: 44px;
      background: rgba(20,20,20,0.7);
      border-radius: 50%;
      border: none;
      color: var(--white);
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid transparent;
      z-index: 10;
    }
    .detail-btn-close.focused { border-color: var(--white); }
    .detail-btn-close svg { width: 20px; height: 20px; fill: currentColor; }

    .detail-body {
      display: flex;
      gap: 32px;
      padding: 24px 40px 40px;
    }

    .detail-body-left { flex: 2; }
    .detail-body-right { flex: 1; font-size: 16px; color: var(--netflix-light-gray); }

    .detail-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 16px;
      margin-bottom: 16px;
    }

    .detail-match { color: #46d369; font-weight: 700; font-size: 18px; }
    .detail-year { color: var(--netflix-light-gray); }
    .detail-seasons { color: var(--netflix-light-gray); }
    .detail-hd {
      border: 1px solid rgba(255,255,255,0.4);
      padding: 1px 6px;
      font-size: 13px;
      color: var(--netflix-light-gray);
    }

    .detail-desc { font-size: 18px; line-height: 1.6; color: var(--white); }

    .detail-tags { margin-top: 16px; font-size: 15px; color: var(--netflix-light-gray); line-height: 1.9; }
    .detail-tags span { color: var(--white); }

    /* ===================== SEARCH SCREEN ===================== */
    #search-screen {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 400;
      background: var(--netflix-dark);
      padding: 90px 60px 40px;
      overflow: hidden;
    }

    #search-screen.active { display: block; }

    .search-input-wrap {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 40px;
    }

    .search-input-wrap svg { width: 36px; height: 36px; fill: var(--white); flex-shrink: 0; }

    .search-input {
      font-size: 36px;
      font-family: inherit;
      background: transparent;
      border: none;
      outline: none;
      color: var(--white);
      width: 100%;
      caret-color: var(--netflix-red);
    }

    .search-input::placeholder { color: var(--netflix-gray); }

    .search-keyboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }

    .keyboard-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .key-btn {
      height: 60px;
      background: #333;
      border: 2px solid transparent;
      border-radius: 4px;
      color: var(--white);
      font-size: 22px;
      font-family: inherit;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.1s, background 0.1s;
    }

    .key-btn.focused { border-color: var(--white); background: #444; }
    .key-btn.wide { grid-column: span 2; }
    .key-btn.wider { grid-column: span 3; }

    .search-results-section h3 { font-size: 22px; font-weight: 500; margin-bottom: 20px; }

    .search-results-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      overflow-y: hidden;
      max-height: 340px;
    }

    .search-result-card {
      aspect-ratio: 16/9;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      position: relative;
      transition: border-color 0.15s;
    }

    .search-result-card.focused { border-color: var(--white); }
    .search-result-card img { width: 100%; height: 100%; object-fit: cover; }
    .search-result-card .card-title {
      position: absolute;
      bottom: 8px; left: 8px;
      font-size: 14px;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.9);
    }

    /* ===================== VIDEO PLAYER ===================== */
    #player-screen {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 500;
      background: #000;
    }

    #player-screen.active { display: flex; flex-direction: column; }

    .player-video-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: #000;
    }

    .player-still {
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.7;
    }

    .player-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 60px 60px;
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 60%);
      opacity: 1;
      transition: opacity 0.3s;
    }

    .player-title-info {
      margin-bottom: 20px;
    }

    .player-show-title { font-size: 28px; font-weight: 700; }
    .player-ep-title { font-size: 20px; color: var(--netflix-light-gray); margin-top: 4px; }

    .player-progress-wrap {
      margin-bottom: 20px;
    }

    .player-time-row {
      display: flex;
      justify-content: space-between;
      font-size: 16px;
      color: var(--netflix-light-gray);
      margin-bottom: 8px;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
      position: relative;
      cursor: pointer;
    }

    .progress-fill {
      height: 100%;
      background: var(--netflix-red);
      border-radius: 2px;
      width: 18%;
      position: relative;
    }

    .progress-thumb {
      position: absolute;
      right: -6px;
      top: -4px;
      width: 12px; height: 12px;
      background: var(--white);
      border-radius: 50%;
    }

    .player-controls {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .player-ctrl-btn {
      background: none;
      border: 2px solid transparent;
      color: var(--white);
      cursor: pointer;
      width: 56px; height: 56px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s;
    }

    .player-ctrl-btn.focused { border-color: var(--white); }
    .player-ctrl-btn svg { width: 30px; height: 30px; fill: currentColor; }
    .player-ctrl-btn.play-pause svg { width: 40px; height: 40px; }

    .player-vol-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }

    .player-time-total { font-size: 18px; }

    .player-back-btn {
      position: absolute;
      top: 40px; left: 60px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: none;
      border: none;
      color: var(--white);
      font-size: 18px;
      font-family: inherit;
      cursor: pointer;
      border: 2px solid transparent;
      padding: 10px 16px;
      border-radius: 4px;
      transition: border-color 0.15s;
    }

    .player-back-btn.focused { border-color: var(--white); }
    .player-back-btn svg { width: 24px; height: 24px; fill: currentColor; }

    /* ===================== MY LIST SCREEN ===================== */
    #mylist-screen {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 150;
      background: var(--netflix-dark);
      padding: 90px 60px 40px;
      overflow: hidden;
    }

    #mylist-screen.active { display: block; }

    #mylist-screen h1 { font-size: 38px; font-weight: 500; margin-bottom: 40px; }

    .mylist-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
    }

    .mylist-card {
      aspect-ratio: 16/9;
      border-radius: 4px;
      overflow: hidden;
      border: 2px solid transparent;
      cursor: pointer;
      position: relative;
      transition: border-color 0.15s, transform 0.2s;
    }

    .mylist-card.focused { border-color: var(--white); transform: scale(1.05); }
    .mylist-card img { width: 100%; height: 100%; object-fit: cover; }

    /* ===================== TRANSITIONS ===================== */
    .screen-transition {
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ===================== SCROLLBAR HIDE ===================== */
    ::-webkit-scrollbar { display: none; }
  </style>

<!-- ==================== PIN SCREEN ==================== -->
<div id="pin-screen">

      <div class="pin-dot" id="dot-1"></div>

    </div>
    <div class="pin-numpad" id="pin-numpad">
      <!-- filled by JS -->
    </div>
  </div>
</div>

<!-- ==================== BROWSE SCREEN ==================== -->
<div id="browse-screen">
  <!-- Navbar -->
  <nav class="nav-bar" id="nav-bar">
    <div class="nav-logo">
      <svg viewBox="0 0 111 30" xmlns="http://www.w3.org/2000/svg">
        <path d="M105.062 14.28L111 30c-1.75-.25-3.499-.563-5.28-.845l-3.345-8.686-3.437 7.969c-1.687-.282-3.344-.376-5.031-.595l6.031-13.75L94.468 0h5.063l3.062 7.874L105.875 0h5.124l-5.937 14.28zM90.47 0h-4.956v27.252c1.656.094 3.374.188 5.03.344V0h-.074zM81.745 10.846c0-3.188 0-6.407-.032-9.627H71.902V28.19c1.656-.188 3.312-.313 5-.47V18.19h5.844v-4.938h-5.843V5.69h6.656V.063h-.28V.032c-.376.03-.75.03-1.126.03-.437 0-.875-.03-1.312-.03l.312 10.75zM66.09 0H56.747v27.75c1.657-.157 3.282-.25 4.97-.375V.876H66.09V0zm-14.03 1.126C50.904.313 49.279 0 47.748 0H38.56v28.44c1.626.063 3.25.125 4.875.22V6.063h2.281c.876 0 1.688.25 2.094 1.062.437.875.625 1.969.625 3.5v2.875c0 1.531-.25 2.625-.625 3.375-.375.75-1.156 1.094-2 1.094h-2.312V13H43.06v4.844H44.998c1.782 0 3.188-.375 4.22-1.188 1.094-.875 2.312-3.875.312-3.875-.438-1.687-.657-3.875-.657-6.5 0-2.593-.22-4.718-.657-6.437-.375-1.5-1.125-2.625-2.062-3.375L50.09 1.126V1.06zM35.155 0H30.5v21.5L23.53 0h-4.5v27.44c1.625.094 3.25.22 4.875.344V7.75l6.813 20.502c1.624.125 3.25.25 4.874.407V0h-.437zM16.717 0H7.342v28.752c1.657.188 3.28.47 4.938.72V17.22h5.719v-4.938h-5.72V5.753h6.47V0h-.032z"/>

    <ul class="nav-links">

      <li><a href="#" data-nav-item="tvshows">TV Shows</a></li>

    </ul>
    <div class="nav-right">
      <button class="nav-icon-btn" id="nav-search-btn" title="Search">

    <div class="hero-gradient"></div>
    <div class="hero-gradient-left"></div>
    <div class="hero-info">
      <div class="hero-title" id="hero-title"></div>
      <div class="hero-meta">
        <span class="hero-match" id="hero-match"></span>
        <span id="hero-year"></span>
        <span class="hero-age-rating" id="hero-rating"></span>

      </div>
      <div class="hero-desc" id="hero-desc"></div>
      <div class="hero-buttons">
        <button class="hero-btn btn-play" id="hero-play-btn">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>

  <!-- Rows -->

    <div class="rows-inner" id="rows-inner">

    </div>
  </div>
</div>

<div id="detail-overlay">

          <span class="detail-seasons" id="detail-seasons"></span>

        <div class="detail-tags" id="detail-genres"></div>

    </div>
